steps:
  # Step 1: Install dependencies
  - name: "node:18-alpine"
    entrypoint: "npm"
    args: ["install"]

  # Step 2: Run tests
  - name: "node:18-alpine"
    entrypoint: "npm"
    args: ["test"]

  # Step 3: Log in to Docker Hub
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - "echo $_DOCKERHUB_TOKEN | docker login --username $_DOCKERHUB_USERNAME --password-stdin"

  # Step 4: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "$_DOCKERHUB_USERNAME/product-api:latest"
      - "-t"
      - "$_DOCKERHUB_USERNAME/product-api:$COMMIT_SHA"
      - "."

  # Step 5: Push image tagged as latest
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "$_DOCKERHUB_USERNAME/product-api:latest"

  # Step 6: Push image tagged with commit SHA
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "$_DOCKERHUB_USERNAME/product-api:$COMMIT_SHA"

  # Step 7: Deploy to GKE
  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - "apply"
      - "-f"
      - "k8s/deployment.yaml"
    env:
      - "CLOUDSDK_COMPUTE_REGION=$_REGION"
      - "CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER"

  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - "apply"
      - "-f"
      - "k8s/service.yaml"
    env:
      - "CLOUDSDK_COMPUTE_REGION=$_REGION"
      - "CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER"

substitutions:
  _DOCKERHUB_USERNAME: ""
  _DOCKERHUB_TOKEN: ""
  _REGION: us-central1
  _CLUSTER: capstone-project

options:
  logging: CLOUD_LOGGING_ONLY